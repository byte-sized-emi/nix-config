<!doctype html><html lang=en><meta charset=UTF-8><meta content="width=device-width,initial-scale=1.0" name=viewport><title>Blog</title><style>*{box-sizing:border-box;margin:0;padding:0}body{color:#333;background-color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;line-height:1.6}.container{max-width:900px;margin:0 auto;padding:2rem}header{text-align:center;background-color:#fff;border-radius:8px;margin-bottom:3rem;padding:2rem;box-shadow:0 2px 4px #0000001a}h1{color:#222;margin-bottom:.5rem;font-size:2.5rem}.post-meta{color:#666;flex-wrap:wrap;justify-content:center;gap:1.5rem;font-size:.95rem;display:flex}.post-date{font-weight:500}.post-authors{gap:.5rem;display:flex}.post-tags{flex-wrap:wrap;justify-content:center;gap:.5rem;margin-top:1rem;display:flex}.tag{color:#333;background-color:#e0e0e0;border-radius:20px;padding:.25rem .75rem;font-size:.85rem;display:inline-block}main{background-color:#fff;border-radius:8px;padding:2rem;box-shadow:0 2px 4px #0000001a}main h2{color:#222;margin:1.5rem 0 1rem;font-size:2rem}main h3{color:#333;margin:1.25rem 0 .75rem;font-size:1.5rem}main h4,main h5,main h6{color:#444;margin:1rem 0 .5rem}main p{margin-bottom:1rem}main ul,main ol{margin-bottom:1rem;margin-left:2rem}main li{margin-bottom:.5rem}main code{background-color:#f0f0f0;border-radius:3px;padding:.2rem .4rem;font-family:Courier New,monospace;font-size:.9rem}main pre{background-color:#f0f0f0;border-radius:6px;margin-bottom:1rem;padding:1rem;overflow-x:auto}main pre code{background-color:#0000;border-radius:0;padding:0}main blockquote{color:#666;border-left:4px solid #ddd;margin:1rem 0;padding-left:1rem;font-style:italic}main a{color:#06c;text-decoration:none}main a:hover{text-decoration:underline}.spoiler{color:#333;cursor:pointer;background-color:#333;border-radius:3px;padding:.2rem .4rem;transition:all .2s}.spoiler:hover{background-color:#555}nav{text-align:center;border-top:1px solid #ddd;margin-top:2rem;padding-top:2rem}nav a{color:#06c;background-color:#f0f0f0;border-radius:6px;padding:.5rem 1.5rem;text-decoration:none;transition:background-color .2s;display:inline-block}nav a:hover{background-color:#e0e0e0}.posts{gap:1.5rem;display:grid}.post{background-color:#fff;border-radius:8px;padding:2rem;transition:box-shadow .3s;box-shadow:0 2px 4px #0000001a}.post:hover{box-shadow:0 4px 8px #00000026}.post h2{color:#222;margin-bottom:.5rem;font-size:1.8rem}.empty-message{text-align:center;color:#666;background-color:#fff;border-radius:8px;padding:3rem}</style><body><div class=container><header><h1>Blog</h1></header><main><div class=empty-message><p>No blog posts available yet.</div></main></div>
