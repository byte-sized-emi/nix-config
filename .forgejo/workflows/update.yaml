name: Update hosts

on:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Tailscale join
        uses: https://github.com/tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd
          version: latest
          use-cache: "false"
          tailscaled-args: --verbose 2 --tun=userspace-networking --socks5-server=localhost:1055 --outbound-http-proxy-listen=localhost:1055
          ping: ${{ matrix.host }}

      - name: Test connectivity
        run: |
          # Test that we can reach the Tailscale network
          tailscale status

          # Show our IP address
          tailscale ip

      - name: Install nix
        uses: https://github.com/DeterminateSystems/nix-installer-action@v21
        with:
          # proxy: http://localhost:1055/
          extra-conf: |
            accept-flake-config = true

      - name: try to reach https://cache.service.byte-sized.fyi/
        run: |
          export http_proxy=http://localhost:1055/
          export ALL_PROXY=socks5://localhost:1055/
          export HTTP_PROXY=http://localhost:1055/

          curl https://cache.service.byte-sized.fyi/nix-cache-info

      - uses: actions/checkout@v6
      - run: nix flake metadata
      - run: nix flake show
      # - run: nix flake check --no-build

  update-hosts:
    runs-on: ubuntu-latest
    needs: check

    strategy:
      matrix:
        host:
          - nixnest.bushbaby-chimera.ts.net
          - nixlaptop.bushbaby-chimera.ts.net
          # - nixda.bushbaby-chimera.ts.net # update this manually

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Tailscale join
        uses: https://github.com/tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd
          version: latest
          use-cache: "false"
          tailscaled-args: --verbose 2 --tun=userspace-networking --socks5-server=localhost:1055 --outbound-http-proxy-listen=localhost:1055
          ping: ${{ matrix.host }}

      - name: Test connectivity
        run: |
          # Test that we can reach the Tailscale network
          tailscale status

          # Show our IP address
          tailscale ip

      - name: Updating host
        run: |
          export http_proxy=http://localhost:1055/
          export ALL_PROXY=socks5://localhost:1055/
          export HTTP_PROXY=http://localhost:1055/

          curl -X POST -sS --no-buffer --connect-timeout 20 http://${{ matrix.host }}:36196/update
